services:
  app:
    build: .
    container_name: schedulehelper
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - schedulehelper_data:/data
    environment:
      - PORT=8080
      - DB_PATH=/data/schedulehelper.db
      - STATIC_DIR=/app/static

volumes:
  schedulehelper_data:
